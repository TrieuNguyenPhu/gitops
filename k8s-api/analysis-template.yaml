apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: demo
spec:
  metrics:
  - name: success-rate
    successCondition: result[0] >= 0.95
    failureLimit: 3
    interval: 30s
    count: 3
    provider:
      prometheus:
        address: http://kube-prometheus-stack-prometheus.monitoring:9090
        query: |
          sum(rate(
            flask_http_request_total{status!~"5..",namespace="demo",service="api"}[2m]
          )) /
          sum(rate(
            flask_http_request_total{namespace="demo",service="api"}[2m]
          ))
